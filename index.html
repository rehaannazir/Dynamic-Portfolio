<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO
         title / description / canonical / og:url / og:title / og:description are intentionally
         NOT duplicated here — every route sets its own via <Helmet> in its page/section
         component (src/pages/, src/blog/). react-helmet-async only ever removes tags it added itself
         (tracked via a data-rh attribute); it never touches tags baked into the static HTML.
         Keeping a second static copy here would leave two <link rel="canonical"> (and duplicate
         description/og tags) on every route once Helmet mounts — which is an invalid, conflicting
         canonical and exactly what trips Lighthouse/Search Console's canonical check. -->
    <title>Rehan Nazir — AI Engineer & Automation Specialist | Lahore, Pakistan</title>
    <meta name="keywords" content="AI engineer Pakistan, automation specialist Lahore, FastAPI developer, n8n automation, AI agents, RAG chatbot, LLM engineer, Nexara, Rehan Nazir, freelance AI developer, workflow automation, Python developer" />
    <meta name="author" content="Rehan Nazir" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://rehannazir.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="Rehan Nazir Portfolio" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@rehaannazir" />
    <meta name="twitter:creator" content="@rehaannazir" />
    <meta name="twitter:title" content="Rehan Nazir — AI Engineer & Automation Specialist" />
    <meta name="twitter:description" content="I build AI agents, n8n automations and self-running workflows. Founder of Nexara. Available for projects worldwide." />
    <meta name="twitter:image" content="https://rehannazir.com/og-image.jpg" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#07070d" />
    <meta name="msapplication-TileColor" content="#07070d" />

    <!-- Geo targeting -->
    <meta name="geo.region" content="PK-PB" />
    <meta name="geo.placename" content="Lahore, Punjab, Pakistan" />

    <!-- LCP image: preload the AVIF; browsers that support AVIF get <2KB vs 62KB JPEG.
         Non-AVIF browsers skip this preload and load via the <picture> element at runtime. -->
    <link rel="preload" as="image" href="/rehan-144.avif"
          imagesrcset="/rehan-144.avif 144w, /rehan-288.avif 288w, /rehan-432.avif 432w"
          imagesizes="144px" type="image/avif" fetchpriority="high" />
    <!-- Fonts: JetBrains Mono is self-hosted (see index.css @fontsource imports).
         Inter is not loaded — the CSS uses system-ui which resolves before Inter on every OS,
         making the Google Fonts Inter load unnecessary. -->

    <!-- JSON-LD: Person -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Rehan Nazir",
      "url": "https://rehannazir.com",
      "image": "https://rehannazir.com/rehan.jpeg",
      "jobTitle": "AI Engineer & Automation Specialist",
      "description": "Self-taught AI engineer building agentic systems and automations. Founder of Nexara.",
      "email": "rehaan689nazir@gmail.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Lahore",
        "addressRegion": "Punjab",
        "addressCountry": "PK"
      },
      "sameAs": [
        "https://github.com/rehaannazir",
        "https://www.linkedin.com/in/rehan-nazir-530597332"
      ],
      "knowsAbout": ["AI Engineering", "Automation", "FastAPI", "n8n", "RAG", "LLMs", "Python", "React"]
    }
    </script>

    <!-- JSON-LD: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Rehan Nazir — Portfolio",
      "url": "https://rehannazir.com",
      "description": "Portfolio and blog of Rehan Nazir, AI Engineer and Automation Specialist.",
      "author": {
        "@type": "Person",
        "name": "Rehan Nazir"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://rehannazir.com/blog?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: ProfessionalService (Nexara) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Nexara",
      "founder": {
        "@type": "Person",
        "name": "Rehan Nazir"
      },
      "url": "https://rehannazir.com",
      "description": "AI automation agency building intelligent systems — AI agents, chatbots, n8n workflows and FastAPI backends.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Lahore",
        "addressCountry": "PK"
      },
      "serviceType": ["AI Engineering", "Workflow Automation", "Chatbot Development", "Backend Development"],
      "areaServed": "Worldwide"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <h1>Rehan Nazir — AI Engineer &amp; Automation Specialist</h1>
      <p>I build AI agents, chatbots, n8n workflows and FastAPI backends for businesses worldwide. Founder of Nexara, based in Lahore, Pakistan.</p>
      <p>Contact: <a href="mailto:rehaan689nazir@gmail.com">rehaan689nazir@gmail.com</a></p>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
